];

const TIMES = ["golden hour at sunset, long warm shadows stretching east","harsh midday sun, deep short shadows, bleached colour","early morning, low sun casting long diagonal shadows","late afternoon, amber light turning everything golden","just after sunrise, soft directional light, dew still on surfaces","blue hour just after sunset, sky deepening to indigo","mid-morning, crisp clear light, day fully underway","noon with almost no shadow, everything exposed","late evening, day cooling, light going soft and warm","3am under sodium streetlights, orange cast on everything","pre-dawn, sky barely lightening, one bird already calling","twilight, shapes losing definition, lights starting to matter","overcast midday, flat diffused light, no shadows at all","dusk, the last ten minutes before dark","morning rush hour, strong raking light, everyone in motion"];
const WEATHER = ["clear blue sky, no clouds, perfect natural light","overcast with soft even cloud cover, no harsh shadows","light summer rain, everything slightly wet and shining","heat haze shimmering off asphalt, deep summer","autumn day, leaves turning, cool clear air","dry winter cold, bare trees, low sun, sharp shadows","humid summer evening, air heavy, everything slightly damp","thin clouds softening the sunlight, warm and hazy","just after rain, everything freshly wet, sky clearing","dense morning fog slowly lifting","thunderstorm building in the distance, sky turning green","post-storm clarity, washed air and sharp light","late summer humidity, everything lush and slightly oppressive","early spring, cold and clear, first warm day","dust in the air, dry wind from the west, light going amber"];
const SEASONS = ["peak American summer, lush and humid","early fall, leaves just beginning to turn","deep midwestern winter, bare trees and frozen ground","spring bloom, everything green and new","late summer, heat fading but still present","October, full autumn colour","February, cold and spare but bright","April, rain and new growth","July heat, baked and still","November, stripped back, low light"];
const MOODS = ["quietly beautiful, no drama needed","nostalgic without being sad","the feeling of a Sunday afternoon with nowhere to be","something just happened or is about to","ordinary and somehow perfect","the loneliness that isn't quite loneliness","warm and slightly melancholic","the last moment before everything changes","unhurried and real","beautiful in a way that doesn't announce itself","the quality of light that makes you stop","intimately observed, like a private photograph","the texture of a life being lived","still and charged at the same time","the kind of scene a filmmaker would remember years later"];
const CAMERA = ["wide angle 24mm, vast sky dominating frame","50mm lens, natural perspective, mid-distance","85mm portrait lens, shallow depth of field, background softened","long telephoto 200mm, compressed perspective","low angle looking up at sign or sky","high angle looking down at street or floor","locked-off static shot, perfectly composed","handheld, slightly unsteady, documentary feel","through a window, reflections layered with interior","silhouette against the light","extreme close-up of texture and surface detail","slow dolly move along an empty space","bird's eye view from above","rack focus from foreground detail to background","through windshield, dashboard reflection visible"];
const STYLE = ["Kodak Portra 400 film aesthetic, warm and slightly faded","35mm film grain, saturated American colours","digital cinema, warm teal and orange grade","Terrence Malick golden hour cinematography","Edward Hopper painting quality, light and stillness","Stephen Shore photography, deadpan American everyday","William Eggleston colour photography, banal and beautiful","soft focus dreamlike quality, hazy edges","crisp architectural photography, clean and precise","gritty street photography, unflinching and real","contemporary American indie film look","hyperrealistic CGI environment, photographic clarity","long lens heat haze, shimmering and compressed","bleach bypass processing, desaturated with contrast","Super 8 film aesthetic, warm grain and vignette"];
const PERCEPTION = ["slight focus drift, as if the lens is struggling to settle","subtle temporal lag, movement feels delayed","soft motion blur lingering after stillness","light flickers unnaturally, barely perceptible","colours slightly misaligned, like a memory offset","depth feels inconsistent, foreground and background blending","visual noise creeping in like analog signal decay","frame feels almost still, but not completely frozen"];
const CORE_FIXED = "the quiet weight of an ordinary moment";
const CORE_VARIATION = ["something here will be remembered long after it's gone","the world going on as it always does, beautiful for no reason","as if the camera arrived just in time"];
const FIELD_COLORS = ["#fcd34d","#fda4af","#86efac","#67e8f9","#c084fc","#a5f3fc","#d9f99d","#fed7aa"];

let lastVals = {};
function reroll(key){const s={location:LOCATIONS,time:TIMES,weather:WEATHER,season:SEASONS,mood:MOODS,camera:CAMERA,style:STYLE};if(s[key])lastVals[key]=pick(s[key]);else if(key==='perception')lastVals.perception=Math.random()<0.35?pick(PERCEPTION):null;rebuildPrompt();}
function rebuildPrompt(){const v=lastVals;const parts=["United States of America",v.location,v.season,v.time,v.weather,`mood: ${v.mood}`,v.camera,v.style,...(v.perception?[v.perception]:[]),CORE_FIXED,...(v.variation?[v.variation]:[]),"cinematic everyday America, filmic photography, natural light, high detail, no people"];currentPrompt=parts.join(", ");document.getElementById("promptTextarea").value=currentPrompt;renderResultFields();}
function renderResultFields(){const v=lastVals;const fields=[{label:"ロケーション",value:v.location,color:FIELD_COLORS[0],key:"location"},{label:"季節",value:v.season,color:FIELD_COLORS[1],key:"season"},{label:"時間帯",value:v.time,color:FIELD_COLORS[2],key:"time"},{label:"天気",value:v.weather,color:FIELD_COLORS[3],key:"weather"},{label:"ムード",value:v.mood,color:FIELD_COLORS[4],key:"mood"},{label:"カメラ",value:v.camera,color:FIELD_COLORS[5],key:"camera"},{label:"スタイル",value:v.style,color:FIELD_COLORS[6],key:"style"}];if(v.perception)fields.push({label:"知覚歪曲",value:v.perception,color:"#c084fc",key:"perception",rare:true});const html=fields.map(f=>`<div class="field"><div class="field-label">${f.label}</div><div class="field-value" style="color:${f.color}">${f.value}${f.rare?`<span class="rare-badge" style="color:${f.color}">rare</span>`:""}</div><button class="reroll-btn" onclick="reroll('${f.key}')">🔄</button></div>`).join("");document.getElementById("result").innerHTML=`<div class="fields animate-in">${html}</div><hr class="divider"><div class="prompt-label">画像AIにコピー</div><textarea class="prompt-textarea" id="promptTextarea" oninput="currentPrompt=this.value"></textarea><button class="copy-btn" id="copyBtn" onclick="copyPrompt()">Copy</button>`;document.getElementById("promptTextarea").value=currentPrompt;}
function generate(){generated++;document.getElementById("counter").textContent=`${generated} generated`;const location=pick(LOCATIONS);const time=pick(TIMES);const weather=pick(WEATHER);const season=pick(SEASONS);const mood=pick(MOODS);const camera=pick(CAMERA);const style=pick(STYLE);const perception=Math.random()<0.35?pick(PERCEPTION):null;const variation=Math.random()<0.5?pick(CORE_VARIATION):null;lastVals={location,time,weather,season,mood,camera,style,perception,variation};const parts=["United States of America",location,season,time,weather,`mood: ${mood}`,camera,style,...(perception?[perception]:[]),CORE_FIXED,...(variation?[variation]:[]),"cinematic everyday America, filmic photography, natural light, high detail, no people"];currentPrompt=parts.join(", ");document.getElementById("emptyState").style.display="none";document.getElementById("result").style.display="block";document.getElementById("saveBtn").style.display="block";renderResultFields();}
function copyPrompt(){currentPrompt=document.getElementById("promptTextarea")?.value||currentPrompt;if(!currentPrompt)return;navigator.clipboard.writeText(currentPrompt).then(()=>{const b=document.getElementById("copyBtn");b.textContent="Copied ✓";b.classList.add("copied");setTimeout(()=>{b.textContent="Copy";b.classList.remove("copied");},2000);});}
function savePrompt(){if(!currentPrompt)return;let s=JSON.parse(localStorage.getItem("cin_america_v1")||"[]");if(s.includes(currentPrompt))return;s.unshift(currentPrompt);localStorage.setItem("cin_america_v1",JSON.stringify(s.slice(0,30)));renderSaved();}
function renderSaved(){const s=JSON.parse(localStorage.getItem("cin_america_v1")||"[]");const sec=document.getElementById("savedSection");const list=document.getElementById("savedList");if(s.length===0){sec.style.display="none";return;}sec.style.display="block";list.innerHTML=s.map((p,i)=>`<div class="saved-item" data-index="${i}">${p}</div>`).join("");document.querySelectorAll(".saved-item").forEach(el=>{el.onclick=()=>navigator.clipboard.writeText(s[el.dataset.index]);});}
renderSaved();
</script>
